<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
</head>
<body>

    <h1>To-Do List</h1>

    <button id="btn-cargar">Cargar tareas</button>

    <h2>Nueva tarea</h2>

    <input type="text" id="titulo" placeholder="Título de la tarea">
    <input type="text" id="descripcion" placeholder="Descripción">
    <input type="datetime-local" id="fecha-limite">

    <button id="btn-crear">Crear tarea</button>

    <ul id="lista-tareas"></ul>

    <script src="app.js"></script>

</body>
</html>
